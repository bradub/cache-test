name: PR Checks

# Add the `skip-cache` label to a PR to force a fully cold run
# (no cache restores; tool binaries installed fresh).
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

env:
  GO_VERSION: "1.26"
  GOLANGCI_LINT_VERSION: v2.12.2
  NILAWAY_VERSION: latest
  SKIP_CACHE: ${{ contains(github.event.pull_request.labels.*.name, 'skip-cache') }}

jobs:
  test:
    name: test (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [go-bar, go-foo]
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: ${{ env.SKIP_CACHE != 'true' }}
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - run: go test ./...

  lint:
    name: lint (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [go-bar, go-foo]
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: ${{ env.SKIP_CACHE != 'true' }}
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Restore golangci-lint binary
        id: golangci-lint-bin-restore
        if: env.SKIP_CACHE != 'true'
        uses: actions/cache/restore@v5
        with:
          path: ~/go/bin/golangci-lint
          key: golangci-lint-bin-${{ runner.os }}-${{ env.GOLANGCI_LINT_VERSION }}-go${{ env.GO_VERSION }}

      - name: Install golangci-lint (fallback when cache misses)
        if: steps.golangci-lint-bin-restore.outputs.cache-hit != 'true'
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${{ env.GOLANGCI_LINT_VERSION }}

      - name: Restore golangci-lint analysis cache
        if: env.SKIP_CACHE != 'true'
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/golangci-lint
          key: golangci-lint-${{ runner.os }}-${{ env.GOLANGCI_LINT_VERSION }}-${{ matrix.module }}-${{ hashFiles('.golangci.yml', format('{0}/go.sum', matrix.module)) }}
          restore-keys: |
            golangci-lint-${{ runner.os }}-${{ env.GOLANGCI_LINT_VERSION }}-${{ matrix.module }}-

      - run: golangci-lint run --timeout=5m ./...

  nilaway:
    name: nilaway (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [go-bar, go-foo]
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: ${{ env.SKIP_CACHE != 'true' }}
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Restore nilaway binary
        id: nilaway-bin-restore
        if: env.SKIP_CACHE != 'true'
        uses: actions/cache/restore@v5
        with:
          path: ~/go/bin/nilaway
          key: nilaway-${{ runner.os }}-${{ env.NILAWAY_VERSION }}-go${{ env.GO_VERSION }}

      - name: Install nilaway (fallback when cache misses)
        if: steps.nilaway-bin-restore.outputs.cache-hit != 'true'
        run: go install go.uber.org/nilaway/cmd/nilaway@${{ env.NILAWAY_VERSION }}

      - run: nilaway ./...
