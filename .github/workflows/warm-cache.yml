name: Warm Cache

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GO_VERSION: "1.26"
  GOLANGCI_LINT_VERSION: v2.12.2
  NILAWAY_VERSION: latest

jobs:
  warm-tools:
    name: warm tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Cache golangci-lint binary
        id: golangci-lint-bin-cache
        uses: actions/cache@v5
        with:
          path: ~/go/bin/golangci-lint
          key: golangci-lint-bin-${{ runner.os }}-${{ env.GOLANGCI_LINT_VERSION }}-go${{ env.GO_VERSION }}

      - name: Install golangci-lint
        if: steps.golangci-lint-bin-cache.outputs.cache-hit != 'true'
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${{ env.GOLANGCI_LINT_VERSION }}

      - name: Cache nilaway binary
        id: nilaway-bin-cache
        uses: actions/cache@v5
        with:
          path: ~/go/bin/nilaway
          key: nilaway-${{ runner.os }}-${{ env.NILAWAY_VERSION }}-go${{ env.GO_VERSION }}

      - name: Install nilaway
        if: steps.nilaway-bin-cache.outputs.cache-hit != 'true'
        run: go install go.uber.org/nilaway/cmd/nilaway@${{ env.NILAWAY_VERSION }}

  warm-modules:
    name: warm modules (${{ matrix.module }})
    needs: warm-tools
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [go-bar, go-foo]
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Restore golangci-lint binary
        uses: actions/cache/restore@v5
        with:
          path: ~/go/bin/golangci-lint
          key: golangci-lint-bin-${{ runner.os }}-${{ env.GOLANGCI_LINT_VERSION }}-go${{ env.GO_VERSION }}
          fail-on-cache-miss: true

      - name: Cache golangci-lint analysis
        uses: actions/cache@v5
        with:
          path: ~/.cache/golangci-lint
          key: golangci-lint-${{ runner.os }}-${{ env.GOLANGCI_LINT_VERSION }}-${{ matrix.module }}-${{ hashFiles('.golangci.yml', format('{0}/go.sum', matrix.module)) }}
          restore-keys: |
            golangci-lint-${{ runner.os }}-${{ env.GOLANGCI_LINT_VERSION }}-${{ matrix.module }}-

      - name: Prime module cache
        run: go mod download

      - name: Prime build cache (compile tests, do not run)
        run: go test -run='^$' -count=1 ./...

      - name: Prime golangci-lint analysis cache
        continue-on-error: true
        run: golangci-lint run --issues-exit-code=0 --timeout=5m ./...
